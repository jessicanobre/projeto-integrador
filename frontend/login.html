<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - PetCare+</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fb;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: #fff;
  padding: 30px;
  border-radius: 10px;
  width: 300px;
  text-align: center;
  border: 1px solid #ddd;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
}

button {
  width: 100%;
  padding: 10px;
  background: #2563eb;
  color: white;
  border: none;
  cursor: pointer;
}

.links {
  margin-top: 10px;
}

.links a {
  text-decoration: none;
  color: #2563eb;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
  <h2>Login</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Senha">

  <button onclick="login()">Entrar</button>

  <div class="links">
    <a href="register.html">Criar conta</a>
  </div>
</div>

<script>
function login() {
  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
