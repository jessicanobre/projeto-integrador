<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - PetCare+</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fb;
}

/* NAVBAR */
.navbar {
  background: #ffffff;
  padding: 15px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #e2e8f0;
}

.logo {
  font-weight: bold;
  font-size: 18px;
}

.logout {
  background: #ef4444;
  color: white;
  border: none;
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
}

/* CONTAINER */
.container {
  padding: 30px 40px;
}

/* TÍTULO */
h2 {
  margin-bottom: 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
}

/* CARDS */
.card {
  background: white;
  padding: 25px;
  border-radius: 12px;
  border: 1px solid #e2e8f0;
  text-align: center;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-5px);
}

.card h3 {
  margin-bottom: 10px;
}

.card p {
  font-size: 14px;
  color: #64748b;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">🐾 PetCare+</div>
  <button class="logout" onclick="logout()">Sair</button>
</div>

<!-- CONTEÚDO -->
<div class="container">
  <h2>Dashboard</h2>

  <div class="grid">

    <div class="card" onclick="go('pets.html')">
      <h3>🐾 Pets</h3>
      <p>Gerenciar seus pets</p>
    </div>

    <div class="card" onclick="go('agenda.html')">
      <h3>📅 Agenda</h3>
      <p>Consultas e compromissos</p>
    </div>

    <div class="card" onclick="go('historico.html')">
      <h3>📄 Histórico</h3>
      <p>Registros e atendimentos</p>
    </div>

    <div class="card" onclick="go('vaccines.html')">
      <h3>💉 Vacinas</h3>
      <p>Controle de vacinação</p>
    </div>

  </div>
</div>

<script>
function go(page) {
  window.location.href = page;
}

function logout() {
  window.location.href = "login.html";
}
</script>

</body>
</html>
