<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - PetCare+</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Poppins", sans-serif;
      background: linear-gradient(135deg, #a8d8ff, #e6f3ff);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: #fff;
      width: 360px;
      padding: 35px 30px;
      border-radius: 20px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      text-align: center;
      animation: fadeIn 0.7s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-size: 2rem;
      color: #0077cc;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #666;
      font-size: 1rem;
      margin-bottom: 25px;
    }

    .input-group {
      text-align: left;
      margin-bottom: 18px;
    }

    .input-group label {
      display: block;
      color: #555;
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 5px;
    }

    .input-group input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1.5px solid #bcd9ee;
      outline: none;
      font-size: 0.95rem;
      transition: 0.3s;
    }

    .input-group input:focus {
      border-color: #0077cc;
      box-shadow: 0 0 8px rgba(0,119,204,0.2);
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: #0077cc;
      color: #fff;
      border: none;
      font-size: 1rem;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn:hover {
      background: #005fa3;
    }

    .register {
      margin-top: 18px;
      font-size: 0.95rem;
    }

    .register a {
      color: #0077cc;
      font-weight: 600;
      text-decoration: none;
    }

    .paw {
      font-size: 2.4rem;
      margin-bottom: 10px;
      color: #ff9ecb;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="paw">🐾</div>
    <div class="logo">PetCare+</div>
    <p class="subtitle">Acesse sua conta e cuide do seu pet com carinho 💙</p>

    <form>
      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="seuemail@email.com" required />
      </div>

      <div class="input-group">
        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="Digite sua senha" required />
      </div>

     <button class="btn" type="submit">Entrar</button>
      
    </form>

    <p class="register">Não tem conta? <a href="register.html">Criar conta</a></p>
  </div>
  <script src="js/global.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
