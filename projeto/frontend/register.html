<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criar Conta - PetCare+</title>

  <style>
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background: linear-gradient(135deg, #a8d8ff, #e6f3ff);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: #fff;
      width: 380px;
      padding: 35px;
      border-radius: 20px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
      text-align: center;
    }

    .logo {
      font-size: 2rem;
      color: #0077cc;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 25px;
    }

    .input-group {
      text-align: left;
      margin-bottom: 15px;
    }

    .input-group label {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 5px;
      display: block;
    }

    .input-group input {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1.5px solid #bcd9ee;
      outline: none;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: #0077cc;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }

    .btn:hover {
      background: #005fa3;
    }

    .login {
      margin-top: 15px;
    }

    .login a {
      color: #0077cc;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="logo">PetCare+</div>
    <p class="subtitle">Crie sua conta 🐶💙</p>

    <form id="registerForm">
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" required />
      </div>

      <div class="input-group">
        <label>Senha</label>
        <input type="password" id="password" required />
      </div>

      <div class="input-group">
        <label>Foto de Perfil</label>
        <input type="file" id="photo" accept="image/*" />
      </div>

      <button class="btn" type="submit">Criar Conta</button>
    </form>

    <p class="login">Já tem conta? <a href="login.html">Entrar</a></p>
  </div>

  <script src="js/global.js"></script>
  <script src="js/register.js"></script>
</body>

</html>
